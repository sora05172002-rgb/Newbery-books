<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴베리 수상작 시대별 라이브러리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏆 뉴베리 수상작 시대별 라이브러리 🏆</h1>
        <p>1920년대부터 현재까지! 연도별 수상작의 장르, AR 지수, 줄거리를 탐험해 보세요.</p>
    </header>
    
    <main id="main-content">
    </main>

    <div id="book-modal" class="modal hide">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div class="modal-tags">
                <span id="modal-year" class="tag year-tag"></span>
                <span id="modal-genre" class="tag genre-tag"></span>
                <span id="modal-ar" class="tag ar-tag"></span>
            </div>
            <h2 id="modal-title">책 제목</h2>
            <h3 id="modal-author">저자</h3>
            <div class="divider"></div>
            <p id="modal-summary">줄거리 요약이 이곳에 표시됩니다.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
