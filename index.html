<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴베리 수상작 도서관</title>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f8f9fa;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 30px;
    }
    /* 책들을 바둑판 모양으로 정렬하는 CSS */
    #book-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* 개별 책 카드 디자인 */
    .book-card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .book-card:hover {
      transform: translateY(-5px);
    }
    .book-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    .book-title {
      font-size: 1.1em;
      font-weight: bold;
      margin: 5px 0;
    }
    .book-author {
      font-size: 0.9em;
      color: #666;
    }
    .book-year {
      display: inline-block;
      background-color: #3498db;
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.8em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>📚 뉴베리 수상작 도서관</h1>
  <div id="book-container"></div>

  <script>
    // GitHub에 올린 books.json 파일을 불러옵니다.
    // 주의: index.html과 books.json 파일이 같은 폴더에 있어야 합니다!
    fetch('books.json')
      .then(response => response.json())
      .then(books => {
        const container = document.getElementById('book-container');
        
        books.forEach(book => {
          // 책 카드를 만듭니다.
          const card = document.createElement('div');
          card.className = 'book-card';
          
          // 화면에 보여줄 HTML 내용을 작성합니다 (여기에 이미지 주소가 들어갑니다!)
          card.innerHTML = `
            <img src="${book.image_url}" alt="${book.original_title} 커버">
            <div class="book-year">${book.year}년 수상</div>
            <div class="book-title">${book.original_title}</div>
            <div class="book-author">${book.author}</div>
          `;
          
          container.appendChild(card);
        });
      })
      .catch(error => {
        console.error('책 데이터를 불러오는 중 에러가 발생했습니다:', error);
        document.getElementById('book-container').innerHTML = '<p>데이터를 불러올 수 없습니다.</p>';
      });
  </script>

</body>
</html>
